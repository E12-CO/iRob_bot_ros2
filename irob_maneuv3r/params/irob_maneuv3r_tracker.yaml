iRob_maneuv3r_tracker:
    ros__parameters:
        map_frame_id: "map"
        odom_frame_id: "odom_r1"
        robot_frame_id: "chassis_r1"
        use_odom_tf_only: false

        lookahead_distance: 0.6
        lookahead_ff_points: 10

        walk_kp: 1.3
        walk_ki: 0.001
        walk_kd: 0.0
        walk_max_vel: 1.1
        walk_min_vel: 0.4
        walk_goal_tolerance: 0.04
        
        rotate_kp: 2.5
        rotate_ki: 0.0
        rotate_kd: 0.0
        rotate_max_vel: 1.1
        rotate_goal_tolerance: 0.035
